<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a1a2e"/>

  <!-- Antenna -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="5" r="2.5" fill="#6c63ff"/>

  <!-- Head -->
  <rect x="14" y="14" width="36" height="26" rx="6" fill="#16213e" stroke="#6c63ff" stroke-width="1.5"/>

  <!-- Eyes -->
  <rect x="20" y="22" width="8" height="6" rx="2" fill="#6c63ff"/>
  <rect x="36" y="22" width="8" height="6" rx="2" fill="#6c63ff"/>
  <!-- Eye glow -->
  <rect x="21" y="23" width="3" height="2" rx="1" fill="#a89cff" opacity="0.8"/>
  <rect x="37" y="23" width="3" height="2" rx="1" fill="#a89cff" opacity="0.8"/>

  <!-- Mouth -->
  <rect x="22" y="32" width="20" height="3" rx="1.5" fill="#6c63ff" opacity="0.6"/>
  <rect x="24" y="32" width="4" height="3" rx="1" fill="#6c63ff"/>
  <rect x="30" y="32" width="4" height="3" rx="1" fill="#6c63ff"/>
  <rect x="36" y="32" width="4" height="3" rx="1" fill="#6c63ff"/>

  <!-- Body -->
  <rect x="20" y="42" width="24" height="14" rx="4" fill="#16213e" stroke="#6c63ff" stroke-width="1.5"/>
  <!-- Body circuit lines -->
  <circle cx="32" cy="49" r="3" fill="none" stroke="#6c63ff" stroke-width="1.5"/>
  <line x1="25" y1="49" x2="29" y2="49" stroke="#6c63ff" stroke-width="1" opacity="0.6"/>
  <line x1="35" y1="49" x2="39" y2="49" stroke="#6c63ff" stroke-width="1" opacity="0.6"/>

  <!-- Arms -->
  <rect x="8" y="44" width="10" height="5" rx="2.5" fill="#16213e" stroke="#6c63ff" stroke-width="1.5"/>
  <rect x="46" y="44" width="10" height="5" rx="2.5" fill="#16213e" stroke="#6c63ff" stroke-width="1.5"/>
</svg>
